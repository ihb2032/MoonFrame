name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Pin the MoonBit toolchain so CI matches the version this project is built
# and gated against locally. The official install scripts
# (cli.moonbitlang.com) read MOONBIT_INSTALL_VERSION and URL-encode the `+`
# themselves. Left on "latest", a newer release regressed `moon test` across
# every OS even though the suite is green on this toolchain. To adopt a newer
# toolchain, bump this to a version published under
# https://cli.moonbitlang.com/binaries/<version>/ and re-run the full local
# gate (moon check --deny-warn && moon test && moon fmt && moon info) first.
env:
  MOONBIT_INSTALL_VERSION: "0.9.3+3d4544a9e" # == moon 0.1.20260522 (2026-05-22)

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OSes when one fails — we want the full
      # cross-platform picture on every run.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Show versions
        run: moon version --all

      - name: Update package index
        run: moon update

      - name: Type check (deny warnings)
        run: moon check --deny-warn

      # Every OS runs the default target so platform-specific behaviour
      # (notably the filesystem-backed read/write paths) is exercised on
      # Windows / macOS too. The full multi-backend matrix and the
      # fmt/coverage gates run on Linux to keep CI fast and reliable; drop
      # the `if:` guards below to widen them to every OS.
      - name: Run tests (default target)
        run: moon test

      - name: Run tests (all backends)
        if: runner.os == 'Linux'
        run: moon test --target all

      - name: Format + interface check
        if: runner.os == 'Linux'
        run: |
          moon fmt
          moon info
          # `git diff --exit-code` only inspects *tracked* files, so a newly
          # added package whose generated `pkg.generated.mbti` was never
          # committed — or any other untracked drift — would slip through
          # green. Check the full porcelain status so uncommitted *and*
          # untracked output from `moon fmt` / `moon info` both fail the gate.
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::'moon fmt' / 'moon info' left uncommitted changes — run them locally and commit the result."
            git status --short
            git --no-pager diff
            exit 1
          fi

      - name: Coverage (line coverage must be complete)
        if: runner.os == 'Linux'
        run: |
          moon coverage analyze | tee coverage-analyze.txt
          grep -q "All source files are fully covered" coverage-analyze.txt
