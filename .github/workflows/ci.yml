name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      fuzz_scale:
        description: Differential-fuzzer case multiplier for a release run
        required: true
        default: "10"

# Least privilege: this workflow only checks out the repo and runs the
# toolchain — it never writes back, cuts a release, or touches PRs/issues.
# Pinning the GITHUB_TOKEN to read-only means a compromised step or a tampered
# dependency cannot push commits or otherwise mutate repository state. A future
# job that needs more can widen its own `permissions:` block.
permissions:
  contents: read

# Pin the MoonBit toolchain so CI matches the version this project is built
# and gated against locally. The official install scripts
# (cli.moonbitlang.com) read MOONBIT_INSTALL_VERSION and URL-encode the `+`
# themselves. Left on "latest", a newer release regressed `moon test` across
# every OS even though the suite is green on this toolchain. To adopt a newer
# toolchain, bump this to a version published under
# https://cli.moonbitlang.com/binaries/<version>/ and re-run the full local
# gate (moon check --deny-warn && moon fmt --check && moon info && moon test)
# first.
env:
  MOONBIT_INSTALL_VERSION: "0.10.4+2cc641edf" # == moonc v0.10.4+2cc641edf (2026-07-15)

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OSes when one fails — we want the full
      # cross-platform picture on every run.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        # Pinned to a full commit SHA rather than the movable `v5` tag, so a
        # retagged or compromised release can't silently change what runs in
        # CI. Bump deliberately: resolve the new tag to its commit SHA and
        # update the trailing version comment to match.
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Show versions
        run: moon version --all

      - name: Update package index
        run: moon update

      # ---------------------------------------------------------------------
      # Hard-requirement gate. The pre-acceptance rubric requires four
      # processes — `moon check --deny-warn`, `moon fmt`, `moon info`,
      # `moon test` — each run explicitly below so they are unmistakably
      # present and executed. (`--deny-warn` is a `moon check` flag; `moon
      # fmt` and `moon info` do not take it.)
      # ---------------------------------------------------------------------

      # (1/4) `moon check` — `--deny-warn` turns every enabled warning into an
      # error. The module's `warnings` field in moon.mod widens this to the
      # full strict set (`+a`) minus a few deliberate exceptions
      # (unnecessary_annotation, test_unqualified_package,
      # unqualified_local_using, and the proof-only missing_invariant /
      # missing_reasoning), so the rest are enforced here.
      - name: (1/4) moon check (deny warnings)
        run: moon check --deny-warn

      # (2/4) `moon fmt`. Run in check mode so CI fails on any unformatted
      # file without rewriting the working tree. Formatting is
      # platform-independent, so Linux is authoritative.
      - name: (2/4) moon fmt (formatting check)
        if: runner.os == 'Linux'
        run: moon fmt --check

      - name: Guard public Array copy boundaries
        if: runner.os == 'Linux'
        run: |
          python -B .github/scripts/check_array_copy_boundaries_test.py
          python -B .github/scripts/check_array_copy_boundaries.py

      # (3/4) `moon info`: regenerate the interface (`pkg.generated.mbti`)
      # files and fail on any drift.
      - name: (3/4) moon info (interface drift check)
        if: runner.os == 'Linux'
        run: |
          moon info
          # `git diff --exit-code` only inspects *tracked* files, so a newly
          # added package whose generated `pkg.generated.mbti` was never
          # committed would slip through green. `git add -N` (intent-to-add)
          # pulls untracked output into the diff first, so both tracked drift
          # and a new package's uncommitted mbti fail the gate. `.gitignore`
          # still excludes `_build` / `PLAN*.md`, so only real interface drift
          # trips it.
          git add -N .
          git diff --exit-code

      # (4/4) `moon test`. Every OS runs the default target so
      # platform-specific behaviour (notably the filesystem-backed read/write
      # paths) is exercised on Windows / macOS too.
      - name: (4/4) moon test (default target)
        run: moon test

      # The full multi-backend matrix runs on Linux to keep CI fast; drop the
      # `if:` guard to widen it to every OS.
      - name: Run tests (all backends)
        if: runner.os == 'Linux'
        run: moon test --target all

      # A manual workflow dispatch is the release gate. Keep ordinary PR CI at
      # the deterministic baseline size, then repeat the optimizer differential
      # suite here with the requested multiplier and call out the backend/IO
      # parity suites explicitly rather than relying only on their inclusion in
      # the workspace-wide test run above. The suite clamps the multiplier to
      # 1..=20 and falls back to 1 for a missing or invalid value, so a stray
      # environment variable can never make routine CI unbounded.
      - name: Release differential fuzz expansion
        if: runner.os == 'Linux' && github.event_name == 'workflow_dispatch'
        env:
          MOONFRAME_FUZZ_SCALE: ${{ inputs.fuzz_scale }}
        run: moon test lazy/optimize_fuzz_test.mbt

      - name: Release backend and IO parity suites
        if: runner.os == 'Linux' && github.event_name == 'workflow_dispatch'
        run: |
          moon test series/backend_parity_test.mbt
          moon test io/roundtrip_corpus_test.mbt

      - name: Coverage (line coverage must be complete)
        if: runner.os == 'Linux'
        run: |
          moon coverage analyze | tee coverage-analyze.txt
          grep -q "All source files are fully covered" coverage-analyze.txt

      # Benchmarks are not a performance gate — timings are machine-dependent,
      # so there is no pass/fail threshold. But executing them here means a
      # change that breaks a benchmark at runtime — or a contributed benchmark
      # with a runtime bug — fails CI instead of silently rotting until someone
      # runs `moon bench` locally. `moon check` above only compiles them; this
      # runs them. Linux-only, matching the other heavy gates.
      - name: Run benchmarks (execution check, not a perf gate)
        if: runner.os == 'Linux'
        run: moon bench
